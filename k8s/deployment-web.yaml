apiVersion: apps/v1
kind: Deployment
metadata:
  name: automation-hub-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: automation-hub-web
  template:
    metadata:
      labels:
        app: automation-hub-web
    spec:
      containers:
        - name: web
          image: YOUR_REGISTRY/automation-hub:latest
          ports:
            - containerPort: 8000
          env:
            - name: REQUIRE_API_KEY
              value: "true"
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/1
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: automation-hub-secrets
                  key: ADMIN_API_KEY
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: automation-hub-secrets
                  key: GOOGLE_API_KEY
